services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: itauto
      POSTGRES_PASSWORD: itauto
      POSTGRES_DB: itauto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itauto"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Dev-only configuration: --reload and default credentials are intentional
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn src.router.app:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
